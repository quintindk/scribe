services:
  scribe:
    build: .
    image: scribe:latest
    container_name: scribe
    restart: unless-stopped
    network_mode: host
    env_file: .env
    environment:
      SCRIBE_TRANSPORT: ${SCRIBE_TRANSPORT:-http}
      SCRIBE_HOST: ${SCRIBE_HOST:-0.0.0.0}
      SCRIBE_PORT: ${SCRIBE_PORT:-8000}
      SCRIBE_PATH: ${SCRIBE_PATH:-/mcp}
      QDRANT_URL: ${QDRANT_URL:-http://localhost:6333}
      SCRIBE_ARCHIVE_PREFIX: ${SCRIBE_ARCHIVE_PREFIX:-archive-}
      SCRIBE_SCRATCH_PREFIX: ${SCRIBE_SCRATCH_PREFIX:-scratch-}
      SCRIBE_MEMORY_COLLECTION: ${SCRIBE_MEMORY_COLLECTION:-memory-default}
      COLLECTION_PREFIX: ${COLLECTION_PREFIX:-}
      OPENAI_COMPATIBLE_API_BASE: ${OPENAI_COMPATIBLE_API_BASE:-http://localhost:1234/v1}
      OPENAI_COMPATIBLE_API_KEY: ${OPENAI_COMPATIBLE_API_KEY:-not-needed}
      OPENAI_COMPATIBLE_MODEL: ${OPENAI_COMPATIBLE_MODEL:-text-embedding-nomic-embed-text-v1.5}
      SCRIBE_INGEST_ALLOW_PRIVATE: ${SCRIBE_INGEST_ALLOW_PRIVATE:-false}
      SCRIBE_INGEST_MAX_BYTES: ${SCRIBE_INGEST_MAX_BYTES:-5242880}
      SCRIBE_INGEST_TIMEOUT: ${SCRIBE_INGEST_TIMEOUT:-30}
      SCRIBE_INGEST_PATH_MAX_FILES: ${SCRIBE_INGEST_PATH_MAX_FILES:-500}
      SCRIBE_INGEST_PATH_MAX_BYTES: ${SCRIBE_INGEST_PATH_MAX_BYTES:-26214400}
      SCRIBE_CHUNK_CHARS: ${SCRIBE_CHUNK_CHARS:-1000}
      SCRIBE_CHUNK_OVERLAP: ${SCRIBE_CHUNK_OVERLAP:-200}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ${SCRIBE_DROP_DIR:-./drop}:/drop:ro
